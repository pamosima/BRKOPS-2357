---
global_design_sites:
  - site:
      area:
        name: "{{ catalystcenter_area }}"
        parent_name: Global
    type: area

network_management_details:
  - site_name: Global
    settings:
      dhcp_server:
        - "{{ catalystcenter_dhcp }}"
      dns_server:
        domain_name: "{{ catalystcenter_domain_name }}"
        primary_ip_address: "{{ catalystcenter_dns_server }}"
      ntp_server:
        - "{{ catalystcenter_ntp_server }}"
      timezone: "{{ catalystcenter_timezone }}"
      snmp_server:
        configure_dnac_ip: true
      syslog_server:
        configure_dnac_ip: true

global_credential_details:
  cli_credential:
    - description: CLI
      username: "{{ catalystcenter_cli_user }}"
      password: "{{ catalystcenter_cli_password }}"
      enable_password: "{{ catalystcenter_cli_password }}"
  snmp_v2c_read:
    - description: RO
      read_community: "{{ catalystcenter_snmp_ro_community }}"
  snmp_v2c_write:
    - description: RW
      write_community: "{{ catalystcenter_snmp_rw_community }}"

assign_credentials_to_site:
  Sync: false
  cli_credential:
    description: CLI
    username: "{{ catalystcenter_cli_user }}"
  snmp_v2c_read:
    description: RO
  snmp_v2c_write:
    description: RW
  site_name:
    - "Global/{{ catalystcenter_area }}"
