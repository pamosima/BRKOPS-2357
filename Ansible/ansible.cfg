# Ansible config for playbooks in this directory.
# Run playbooks from the Ansible/ folder (or set ANSIBLE_CONFIG to this file).

[defaults]
# cisco.catalystcenter: install with
#   ansible-galaxy collection install -r requirements.yml -p ./collections
# netbox.netbox may live under ~/.ansible/collections if installed globally.
#
# Use the singular ini key `collections_path` (Ansible 2.18+). Do not set the
# deprecated environment variable ANSIBLE_COLLECTIONS_PATHS (plural); use
# ANSIBLE_COLLECTIONS_PATH (singular) if you must override via env, or unset
# ANSIBLE_COLLECTIONS_PATHS in your shell / IDE to silence the deprecation warning.
collections_path = ./collections:~/.ansible/collections
